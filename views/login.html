<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — Nexio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/public/css/global.css" />
    <link rel="stylesheet" href="/public/css/login.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <img class="brand-logo" src="/public/imagenes/logo-sin-fondo.png" alt="Nexio" />
        <p class="eyebrow">Red social</p>
        <h1>Iniciar sesión</h1>
        <p class="login-lead">Entra a Nexio para escribir y leer posts.</p>

        <form id="loginForm" class="login-form" action="/login" method="POST" novalidate>
          <div>
            <label for="usuario">Nombre de usuario</label>
            <input
              type="text"
              id="usuario"
              name="usuario"
              placeholder="Escribe tu usuario"
              autocomplete="username"
            />
          </div>

          <div>
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Escribe tu contraseña"
              autocomplete="current-password"
            />
          </div>

          <p id="loginMessage" class="form-message" aria-live="polite"></p>

          <button type="submit">Iniciar sesión</button>
        </form>
      </section>
    </main>

    <script src="/public/js/login.js"></script>
  </body>
</html>
