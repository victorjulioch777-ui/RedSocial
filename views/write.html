<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo Post — Nexio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/public/css/global.css" />
    <link rel="stylesheet" href="/public/css/write.css" />
  </head>
  <body>
    <main class="write-page">
      <section class="write-card">
        <p class="eyebrow">Nuevo post</p>
        <h1>Escribe un Post</h1>

        <form id="postForm" class="post-form">
          <div>
            <label for="writer">Tu nombre</label>
            <input
              type="text"
              id="writer"
              placeholder="Escribe tu nombre"
              required
            />
          </div>

          <div>
            <label for="content">Tu Post</label>
            <textarea
              id="content"
              rows="6"
              placeholder="¿Qué estás pensando?"
              required
            ></textarea>
          </div>

          <button type="submit">Publicar</button>
        </form>

        <div class="write-actions">
          <a class="back-link" href="/home">← Regresar al inicio</a>
          <a class="back-link logout-link" href="/logout">Cerrar sesión</a>
        </div>
      </section>
    </main>

    <script src="/public/js/write.js"></script>
  </body>
</html>
