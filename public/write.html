<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Escribe un Post - Red Social</title>
  </head>
  <body>
    <h1>✍️ Escribe un nuevo Post</h1>

    <form id="postForm">
      <label for="writer">Tu nombre:</label><br />
      <input
        type="text"
        id="writer"
        placeholder="Escribe tu nombre"
        required
      /><br /><br />

      <label for="content">Tu Post:</label><br />
      <textarea
        id="content"
        rows="5"
        cols="40"
        placeholder="¿Qué estás pensando?"
        required
      ></textarea
      ><br /><br />

      <button type="submit">Publicar</button>
    </form>

    <br />
    <a href="index.html">← Regresar al inicio</a>

    <script src="write.js"></script>
  </body>
</html>
